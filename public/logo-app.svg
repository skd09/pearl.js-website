<svg width="148" height="36" viewBox="0 0 148 36" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- MARK: stylised < P > ligature -->
  <!-- Left chevron -->
  <polyline points="6,8 1,18 6,28"
    stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right chevron -->
  <polyline points="26,8 31,18 26,28"
    stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Pearl dot — centred between chevrons -->
  <circle cx="16" cy="18" r="4.5"
    fill="none" stroke="#00e5a0" stroke-width="2"/>
  <!-- Inner core -->
  <circle cx="16" cy="18" r="1.6" fill="#00e5a0"/>

  <!-- WORDMARK -->
  <!-- "Pearl" — white, tight tracking -->
  <text x="44" y="24.5"
    font-family="'Geist','Inter',system-ui,sans-serif"
    font-size="19" font-weight="700"
    letter-spacing="-0.045em"
    fill="#f1f1f4">Pearl</text>
  <!-- ".js" — blue accent -->
  <text x="100" y="24.5"
    font-family="'Geist','Inter',system-ui,sans-serif"
    font-size="19" font-weight="700"
    letter-spacing="-0.045em"
    fill="#00e5a0">.js</text>

</svg>
